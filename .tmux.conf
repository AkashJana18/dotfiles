# --------------------------------------------------
# Tmux config
# --------------------------------------------------

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on

# Better indexing
set -g base-index 1
setw -g pane-base-index 1

# Prefix
set -g prefix C-a
unbind C-a
bind C-a send-prefix

# Keep session alive if one pane closes
set -g detach-on-destroy off

# Mouse support
set -g mouse on


# --------------------------------------------------
# Reload config
# --------------------------------------------------
unbind r
bind r source-file ~/.config/tmux/.tmux.conf \; display-message "tmux config reloaded"

# --------------------------------------------------
# Split panes in current directory
# --------------------------------------------------
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'"'"'"'"'
bind - split-window -v -c "#{pane_current_path}"

# --------------------------------------------------
# Vim-style copy mode
# --------------------------------------------------
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Optional: easier entry into copy mode
unbind [
bind Escape copy-mode

# --------------------------------------------------
# Pane resizing with hjkl
# --------------------------------------------------
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Toggle maximize pane
bind m resize-pane -Z

# Kill pane without prompt
bind x kill-pane

# --------------------------------------------------
# TPM plugins
# --------------------------------------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Resurrect / Continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# --------------------------------------------------
# Catppuccin
# --------------------------------------------------
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_status_style 'none'
set -g @catppuccin_pane_status_enabled 'off'
set -g @catppuccin_pane_border_status 'off'

# --------------------------------------------------
# STATUS BAR
# --------------------------------------------------

# set -g status on
set -g status-position bottom
set -g status-justify "absolute-centre"
set -g status-style "bg=default"
set -g status-left-length 100
set -g status-right-length 100
set -g focus-events on

# LEFT SIDE
set -g status-left ""

# Session segment
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"

# Separator
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

# Path segment (shortened)
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{b:pane_current_path}} "

# Zoom indicator
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# RIGHT SIDE
set -g status-right ""

# Date
set -ga status-right "#[fg=#{@thm_lavender}] 󰃭 %Y-%m-%d "

# Time
set -ga status-right "#[fg=#{@thm_blue}] 󰅐 %I:%M %p "

# --------------------------------------------------
# Window styling
# --------------------------------------------------
setw -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
set -g window-status-current-style "bg=#{@thm_blue},fg=#{@thm_bg},bold"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_lavender}"

set -g window-status-activity-style "bg=#{@thm_bg},fg=#{@thm_peach},bold"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -g window-status-separator "#[fg=#{@thm_overlay_0}] │ "

# --------------------------------------------------
# Pane borders
# --------------------------------------------------
set -g pane-border-style "fg=#{@thm_surface_1}"
set -g pane-active-border-style "fg=#{@thm_blue}"

# --------------------------------------------------
# Start TPM
# Keep this line last
# --------------------------------------------------
run '~/.config/tmux/plugins/tpm/tpm'
