
config-version = 2

after-startup-command = []
start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = [
  'move-mouse monitor-lazy-center',
  'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_focus_change',
]

exec-on-workspace-change = ['/bin/bash', '-c',
  '/opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

automatically-unhide-macos-hidden-apps = false

persistent-workspaces = ['1', '2', '3', '4', '5', 'A', 'C', 'D', 'N', 'T', 'M', 'E', 'V']

on-mode-changed = []

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.bottom = 10
outer.top = 5
outer.right = 10

[mode.main.binding]

# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# shift-alt-h = 'workspace prev'
# shift-alt-l = 'workspace next'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Number workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Semantic workspaces
alt-c = 'workspace C'
alt-d = 'workspace D'
alt-n = 'workspace N'
alt-t = 'workspace T'
alt-a = 'workspace A'
alt-m = 'workspace M'
alt-e = 'workspace E'
alt-v = 'workspace V'

# Move window to numbered workspaces
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# App launchers
alt-shift-c = 'exec-and-forget open -a "Google Chrome"'
alt-shift-a = 'exec-and-forget open -a "ChatGPT"'
alt-shift-d = 'exec-and-forget open -a Discord'
alt-shift-n = 'exec-and-forget open -a Notion'
alt-shift-t = 'exec-and-forget open -a Ghostty'
alt-shift-m = 'exec-and-forget open -a "YT Music"'
alt-shift-v = 'exec-and-forget open -a Codex'
alt-enter = 'exec-and-forget open -a Ghostty'

# Workspace toggles
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Service mode
alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# ----------------------------
# Auto-move apps to workspaces
# ----------------------------

# Chrome -> Browser workspace C
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace C'

# Ghostty -> Terminal workspace T
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace T'

# Discord -> Communication workspace D
[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace D'

# Telegram -> Communication workspace D
[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = 'move-node-to-workspace D'

# Native Notion -> Notion workspace N:
[[on-window-detected]]
if.app-id = 'notion.id'
run = 'move-node-to-workspace N'

# ChatGPT Safari Web App -> ChatGPT workspace A
[[on-window-detected]]
if.app-id = 'com.openai.chat'
run = 'move-node-to-workspace A'

[[on-window-detected]]
if.app-id = 'com.apple.Safari.WebApp.A0F53F03-A683-40AD-9A6E-10B04038A025'
run = 'move-node-to-workspace M'

[[on-window-detected]]
if.window-title-regex-substring = "Preferences|Settings|Dialog|Phantom Wallet|Phantom|Sign in|Log in|Connect|obs-studio|studio"
run = "layout floating"

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = "layout floating"

[[on-window-detected]]
if.app-id = 'com.obsproject.obs-studio'
run = "layout floating"

[[on-window-detected]]
if.app-id = 'com.apple.Terminal'
run = "layout floating"


[[on-window-detected]]
if.app-id = 'com.apple.QuickTimePlayerX'
run = "layout floating"

[[on-window-detected]]
if.app-id = 'com.apple.AppStore'
run = "layout floating"

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = 'Phantom Wallet|Phantom|Sign in|Log in|Connect|studio'
run = 'layout floating'


[[on-window-detected]]
if.app-id = 'com.blackmagic-design.DaVinciResolveLite'
run = 'move-node-to-workspace E'

[[on-window-detected]]
if.app-id = 'com.openai.codex'
run = 'move-node-to-workspace V'
